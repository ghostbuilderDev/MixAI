name: Build uploaded HTML project

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - project.zip

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v4

      - name: Extraire le projet
        run: |
          rm -rf generated
          mkdir generated
          unzip -q project.zip -d generated

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Installer Android SDK 35
        uses: android-actions/setup-android@v3

      - name: Installer la plateforme Android 35
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Vérifier le projet
        working-directory: generated
        run: |
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/assets/www/index.html

      - name: Compiler l’APK
        working-directory: generated
        shell: bash
        run: |
          set -o pipefail
          if ! gradle --no-daemon --console=plain :app:assembleDebug --stacktrace 2>&1 | tee ../build.log; then
            echo "::group::Dernières lignes du journal Gradle"
            tail -n 160 ../build.log || true
            echo "::endgroup::"
            MESSAGE=$(grep -E "error:|A problem occurred|What went wrong|Could not|FAILURE:" ../build.log | tail -n 1 || true)
            echo "::error title=Compilation Android::${MESSAGE:-La compilation Gradle a échoué. Ouvre cette étape pour lire le journal.}"
            exit 1
          fi

      - name: Préparer l’APK
        run: |
          mkdir -p apk-output
          cp generated/app/build/outputs/apk/debug/app-debug.apk "apk-output/generated-app-debug.apk"

      - name: Publier comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: Mon-application-apk
          path: apk-output/*.apk

      - name: Publier dans les Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view generated-apk >/dev/null 2>&1; then
            gh release upload generated-apk apk-output/*.apk --clobber
          else
            gh release create generated-apk apk-output/*.apk --title "APK généré" --notes "APK debug généré automatiquement par HTML vers APK Builder."
          fi
